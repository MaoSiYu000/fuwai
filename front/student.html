<script src="js/common.js?v=20260409"></script>
<script>
let allStuRows = [];
let charts = {};
let curXH = '';
let curRows = [];
let loggedIn = false;
let selectedTermIndex = null;
let typeView = 'primary'; // primary | alt

function num(v){ const x = parseFloat(v); return Number.isFinite(x) ? x : null; }
function mean(a){ const v=a.filter(x=>x!=null && !isNaN(x)); return v.length ? v.reduce((p,c)=>p+c,0)/v.length : null; }
function esc(s){ return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }

function fillXH(xh){
  document.getElementById('inp-xh').value = xh;
  document.getElementById('inp-xh').focus();
}
window.fillXH = fillXH;

function loadStudentCSV(){
  return new Promise((res, rej)=>{
    Papa.parse('./data/student_profiles.csv', {
      download:true, header:true, skipEmptyLines:true,
      complete: r => res(r.data),
      error: e => rej(e)
    });
  });
}

function shortTerm(t){
  if(!t) return '';
  const s=String(t);
  const m=s.match(/^(\\d{4})-(\\d{4})-([12])$/);
  // 2020-2021-1 -> 0-1-1（更短，适合轴标签）
  if(m) return `${m[1].slice(-1)}-${m[2].slice(-1)}-${m[3]}`;
  const m2=s.match(/^(\\d{4})-([12])$/);
  if(m2) return `${m2[1].slice(-1)}-${m2[2]}-${m2[2]}`;
  return s;
}

function selectTermByIndex(idx){
  if (idx == null) return;
  const i = Number(idx);
  if (!Number.isFinite(i) || i < 0 || i >= curRows.length) return;
  const sel = document.getElementById('sel-stu-term');
  sel.value = curRows[i].TERM_KEY;
  renderStudent();
}

function top3FromRow(r){
  const arr = [];
  for(let i=0;i<8;i++){
    const p = num(r[`p_mode_${i}`]);
    if(p==null) continue;
    arr.push({ mode:i, p });
  }
  arr.sort((a,b)=>b.p-a.p);
  return arr.slice(0,3);
}

function modeMeta(id){
  return (AppData.modes||[]).find(m=>Number(m.mode_id)===Number(id));
}

function buildStudentContext(){
  const term = document.getElementById('sel-stu-term').value || '';
  const row = term ? (curRows.find(r=>r.TERM_KEY===term) || curRows[curRows.length-1]) : null;
  const base = row || curRows[curRows.length-1];
  return {
    page:'student.html',
    xh: curXH,
    term: term || 'ALL',
    sex: base?.XB || '',
    college: base?.XSM || '',
    major: base?.ZYM || '',
    class: base?.CLASS_NAME || '',
    mode_id: base?.mode_id,
    mode_name: base?.mode_name,
    probs: Array.from({length:8},(_,i)=>({ mode:i, p: term ? num(base?.[`p_mode_${i}`]) : mean(curRows.map(r=>num(r[`p_mode_${i}`]))) })),
    dims: Object.fromEntries(DIM_KEYS.map(k=>[k, term ? num(base?.[k]) : mean(curRows.map(r=>num(r[k]))) ])),
    evidence: term ? (base?.mode_evidence || '') : '',
  };
}

function chatAdd(role, text){
  const log = document.getElementById('chat-log');
  const who = role==='user' ? '你' : 'AI';
  const cls = role==='user' ? 'user' : 'ai';
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.innerHTML = `<span class="chat-role ${cls}">${who}：</span><span>${esc(text)}</span>`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}
window.chatClear = ()=>{ document.getElementById('chat-log').innerHTML=''; };

window.aiExplain = function(){
  const ask = [
    '请做“页面解读”，帮助新用户快速看懂本页学生个人报告（纯中文纯文本，不要Markdown符号/标题/列表符号）。',
    '请按换行分段输出（不需要建议，除非用户追问）：',
    '第一段：这页在回答什么问题（个人画像的核心目的）。',
    '第二段：左侧“模式变化/概率演变”怎么看（点学期会联动什么）。',
    '第三段：中间“当前类型/更多可能”怎么看（Top1 与 Top2/3 的含义）。',
    '第四段：下方“六维度能力演变”怎么看（线上六条线如何判断强弱变化）。',
    '第五段：右上“六维度雷达”怎么看（每一维代表什么）。',
    '第六段：一句话总结：用户应先看哪里抓住重点。'
  ].join('\\n');
  chatSend(ask, { silent:true });
}

window.aiAnalyze = function(){
  const term = document.getElementById('sel-stu-term')?.value || '';
  const ask = [
    '请做“页面分析”，基于本页当前学期口径给出结论与依据（纯中文纯文本，不要Markdown符号/标题/列表符号）。',
    `当前口径：学期=${term||'全部学期（综合）'}`,
    '请按换行分段输出（不需要建议，除非用户追问）：',
    '第一段：一句话结论（该学生当前最核心的类型特征）。',
    '第二段：用本页图表各给1条证据支撑（模式/概率/六维度/雷达中任选3条，合计不超过4句）。',
    '第三段：指出一个需要进一步确认的点（例如概率不确定或某维度波动大），并说明在图上怎么看出来。'
  ].join('\\n');
  chatSend(ask, { silent:true });
}

window.aiSuggest = function(){
  const term = document.getElementById('sel-stu-term')?.value || '';
  const ask = [
    '请基于本页信息给出“建议”。输出必须分为两部分：',
    '理由：用本页可见信息解释为什么要这样做（3条以内，每条1句）。',
    '建议：给出可执行动作（3条以内，每条1-2句，尽量可量化）。',
    '要求：纯中文纯文本，不要Markdown符号/标题/列表符号，不要复述提示词。',
    `当前口径：学期=${term||'全部学期（综合）'}`,
  ].join('\\n');
  chatSend(ask, { silent:true });
}
window.chatSend = async (qOverride, opts)=>{
  const ta = document.getElementById('chat-input');
  const q = (qOverride != null ? String(qOverride) : (ta.value||'')).trim();
  if(!q) return;
  ta.value='';
  const silent = !!opts?.silent;
  if (!silent) chatAdd('user', q);
  const aiDiv = chatAdd('ai', '（分析中...）');
  const ctx = buildStudentContext();
  try{
    const res = await fetch('/api/ai', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ task:'student_report', context: ctx, message:q })
    });
    const text = await res.text();
    const out = res.ok ? text : `请求失败：${text.slice(0,200)}`;
    aiDiv.querySelector('span:last-child').textContent = (window.normalizeAIText ? window.normalizeAIText(out) : out);
  }catch(e){
    aiDiv.querySelector('span:last-child').textContent = `请求异常：${String(e?.message||e)}`;
  }
};

function clearStudent(){
  curXH=''; curRows=[];
  document.getElementById('inp-xh').value='';
  document.getElementById('report').style.display='none';
  document.getElementById('empty').style.display='none';
  document.getElementById('stu-meta').textContent='—';
  const sel = document.getElementById('sel-stu-term');
  sel.innerHTML = '';
}

function setLoggedIn(v){
  loggedIn = !!v;
  document.getElementById('login-card').style.display = loggedIn ? 'none' : '';
  document.getElementById('btn-logout').style.display = loggedIn ? '' : 'none';
}

function logout(){
  localStorage.removeItem('student_last_xh');
  clearStudent();
  setLoggedIn(false);
  document.getElementById('inp-xh').focus();
}
window.logout = logout;

function searchStudent(){
  const xh = (document.getElementById('inp-xh').value||'').trim();
  if(!xh) return;
  curXH = xh;
  curRows = allStuRows.filter(r=>String(r.XH)===xh).sort((a,b)=>String(a.TERM_KEY).localeCompare(String(b.TERM_KEY)));
  if(!curRows.length){
    document.getElementById('report').style.display='none';
    document.getElementById('empty').style.display='';
    document.getElementById('stu-meta').textContent = `学号：${xh}（未找到记录）`;
    return;
  }
  localStorage.setItem('student_last_xh', xh);
  document.getElementById('empty').style.display='none';
  document.getElementById('report').style.display='';
  setLoggedIn(true);
  const first = curRows[0], last = curRows[curRows.length-1];
  document.getElementById('stu-meta').textContent = `学号：${xh} · ${last.XB||'—'} · ${last.XSM||'—'} / ${last.ZYM||'—'}`;
  const sel = document.getElementById('sel-stu-term');
  const terms = curRows.map(r=>r.TERM_KEY);
  sel.innerHTML = `<option value="">全部学期（综合）</option>` + terms.map(t=>`<option value="${t}">${t}</option>`).join('');
  sel.value = last.TERM_KEY; // 默认仍显示当前（最后）学期
  renderStudent();
}

function renderStudent(){
  if(!curRows.length) return;
  const term = document.getElementById('sel-stu-term').value;
  const row = term ? (curRows.find(r=>r.TERM_KEY===term) || curRows[curRows.length-1]) : null;
  const base = row || curRows[curRows.length-1];
  const agg = !term ? {
    p: Array.from({length:8},(_,i)=> mean(curRows.map(r=>num(r[`p_mode_${i}`]))) || 0),
    dims: Object.fromEntries(DIM_KEYS.map(k=>[k, mean(curRows.map(r=>num(r[k]))) || 0])),
  } : null;

  const top = term
    ? top3FromRow(base)
    : Array.from({length:8},(_,i)=>({ mode:i, p: agg.p[i]||0 })).sort((a,b)=>b.p-a.p).slice(0,3);
  const t1 = top[0], t2 = top[1], t3 = top[2];
  const primary = t1 || t2 || t3;
  const alt1 = t2 || null;
  const alt2 = t3 || null;
  const metaP = primary ? modeMeta(primary.mode) : null;
  const metaAlt1 = alt1 ? modeMeta(alt1.mode) : null;
  const metaAlt2 = alt2 ? modeMeta(alt2.mode) : null;
  const cP = primary ? (MODE_COLORS[primary.mode]||'#3B82F6') : '#3B82F6';

  // sel-stu-term 已在标题栏显示并驱动当前学期
  document.getElementById('stu-type-title').textContent = '当前类型';
  document.getElementById('top1-name').textContent = metaP?.name || (primary?`Mode ${primary.mode}`:'—');
  document.getElementById('top1-p').innerHTML = primary ? `${(primary.p*100).toFixed(1)}<span style="font-size:16px;color:var(--text-3);font-weight:800;">%</span>` : '—';
  document.getElementById('top1-p').style.color = cP;
  document.getElementById('top1-desc').textContent = metaP?.description || '';
  document.getElementById('alt1-name').textContent = metaAlt1?.name || (alt1?`Mode ${alt1.mode}`:'—');
  document.getElementById('alt1-p').innerHTML = alt1 ? `${(alt1.p*100).toFixed(1)}<span style="font-size:14px;color:var(--text-3);font-weight:800;">%</span>` : '—';
  document.getElementById('alt1-desc').textContent = metaAlt1?.description || '';
  document.getElementById('alt2-name').textContent = metaAlt2?.name || (alt2?`Mode ${alt2.mode}`:'—');
  document.getElementById('alt2-p').innerHTML = alt2 ? `${(alt2.p*100).toFixed(1)}<span style="font-size:14px;color:var(--text-3);font-weight:800;">%</span>` : '—';
  document.getElementById('alt2-desc').textContent = metaAlt2?.description || '';

  // Evidence
  document.getElementById('stu-evidence').textContent =
    term ? (base.mode_evidence || base.subtype_note || '—')
         : '当前为“全部学期（综合）”口径：模式概率与六维度取各学期平均，用于整体画像概览。';

  // 视图切换
  document.getElementById('view-primary').style.display = (typeView==='primary') ? '' : 'none';
  document.getElementById('view-alt').style.display = (typeView==='alt') ? '' : 'none';
  const btn = document.getElementById('btn-toggle-primary');
  if (btn) btn.textContent = (typeView==='primary') ? '更多可能' : '返回最可能';

  renderStuRadar(term ? base : { ...base, ...agg.dims });
  renderDimEvo();
  renderModeTimeline();
  renderProbTop3();
  setTimeout(()=>Object.values(charts).forEach(c=>c?.resize()), 0);
}

function togglePrimary(){
  typeView = (typeView==='primary') ? 'alt' : 'primary';
  renderStudent();
}
window.togglePrimary = togglePrimary;

function openTermDetailModal(idx){
  const hasIdx = Number.isFinite(idx);
  selectedTermIndex = hasIdx ? idx : null;
  const r = hasIdx ? curRows[idx] : null;
  document.getElementById('term-det-title').textContent = '学期记录明细';
  document.getElementById('term-det-sub').textContent = `学号：${curXH} · 共 ${curRows.length} 学期记录`;
  const tb = document.getElementById('tbl-terms');
  tb.innerHTML = curRows.map((x,i)=>{
    const online = num(x.online_bfb);
    const dev = num(x.sch_amt_sum_term);
    const bg = (hasIdx && i===idx) ? ' style="background:#EFF6FF;"' : '';
    return `<tr${bg}>
      <td>${esc(x.TERM_KEY)}</td>
      <td style="font-weight:700">${esc(x.mode_name||'—')}</td>
      <td>${(num(x.mode_pmax)||0).toFixed(3)}</td>
      <td>${(num(x.mode_entropy)||0).toFixed(3)}</td>
      <td>${num(x.kccj_mean)==null?'—':num(x.kccj_mean).toFixed(1)}</td>
      <td>${num(x.kccj_fail_rate)==null?'—':(num(x.kccj_fail_rate)*100).toFixed(1)+'%'}</td>
      <td>${num(x.att_present_rate)==null?'—':(num(x.att_present_rate)*100).toFixed(1)+'%'}</td>
      <td>${online==null?'—':online.toFixed(1)+'%'}</td>
      <td>${dev==null?'—':dev.toFixed(0)}</td>
    </tr>`;
  }).join('');
  openModal('modal-term-detail');
}
window.openTermDetailModal = openTermDetailModal;

function renderStuRadar(row){
  if(!charts.radar) charts.radar = echarts.init(document.getElementById('chart-stu-radar'));
  const vals = DIM_KEYS.map(k=>num(row[k])||0);
  const maxAbs = Math.max(...vals.map(x=>Math.abs(x)), 1);
  const lim = Math.max(1, Math.ceil(maxAbs*10)/10);
  charts.radar.setOption({
    tooltip:{ confine:false, appendToBody:true, className:'mode-chart-tooltip' },
    legend:{ show:false },
    radar:{ indicator: DIM_NAMES.map(n=>({ name:n, max:lim })), splitNumber:4, radius:'78%', center:['50%','54%'] },
    series:[{ type:'radar', data:[{ value: vals, areaStyle:{ opacity:0.10 } }] }]
  }, { notMerge:true });
}

function renderDimEvo(){
  if(!charts.dimEvo) charts.dimEvo = echarts.init(document.getElementById('chart-dim-evo'));
  const terms = curRows.map(r=>shortTerm(r.TERM_KEY));
  const series = DIM_KEYS.map((k,i)=>({
    name: DIM_NAMES[i],
    type:'line',
    smooth:true,
    symbol:'circle',
    symbolSize:5,
    data: curRows.map(r=>{ const v=num(r[k]); return v==null?null:+v.toFixed(3); }),
    itemStyle:{ color: MODE_COLORS[i] },
    lineStyle:{ color: MODE_COLORS[i], width:2 }
  }));
  charts.dimEvo.setOption({
    tooltip:{ trigger:'axis', confine:false, appendToBody:true, className:'mode-chart-tooltip' },
    legend:{ type:'scroll', bottom:0, textStyle:{ fontSize:11 } },
    grid:{ left:46, right:16, top:24, bottom:50, containLabel:false },
    xAxis:{ type:'category', data:terms, axisLabel:{ fontSize:11 } },
    yAxis:{ type:'value', axisLabel:{ fontSize:11 } },
    series
  }, { notMerge:true });

  charts.dimEvo.off('click');
  charts.dimEvo.on('click', p=>{
    // 点击任一维度在某学期的点 -> 同步选择该学期
    selectTermByIndex(p?.dataIndex);
  });
}

function renderModeTimeline(){
  if(!charts.modeTl) charts.modeTl = echarts.init(document.getElementById('chart-mode-timeline'));
  const terms = curRows.map(r=>shortTerm(r.TERM_KEY));
  charts.modeTl.setOption({
    tooltip:{ confine:false, appendToBody:true, className:'mode-chart-tooltip',
      position: (pt, params, dom, rect, size) => {
        // 保证 tooltip 不跑到视窗外（appendToBody 时尤为重要）
        const [x,y] = pt || [0,0];
        const vw = (document.documentElement?.clientWidth || window.innerWidth || 0);
        const vh = (document.documentElement?.clientHeight || window.innerHeight || 0);
        const w = size?.contentSize?.[0] || 0;
        const h = size?.contentSize?.[1] || 0;
        const pad = 10;
        let nx = x + 14, ny = y + 14;
        if (nx + w + pad > vw) nx = x - w - 14;
        if (ny + h + pad > vh) ny = y - h - 14;
        nx = Math.max(pad, Math.min(vw - w - pad, nx));
        ny = Math.max(pad, Math.min(vh - h - pad, ny));
        return [nx, ny];
      },
      formatter: p => {
        const idx = p?.dataIndex;
        const r = (idx!=null) ? curRows[idx] : null;
        const t = (idx!=null) ? terms[idx] : (p?.axisValue ?? '');
        const mid = r ? (num(r.mode_id) ?? 0) : (typeof p?.data==='number' ? p.data : 0);
        const name = r?.mode_name || '';
        const desc = (AppData.modes || []).find(m=>Number(m.mode_id)===Number(mid))?.description || '';
        const head = `${esc(t)}<br/>Mode ${mid}：${esc(name||'—')}`;
        return desc ? `${head}<div style="margin-top:6px;color:#64748B;line-height:1.55;">${esc(desc)}</div>` : head;
      } },
    grid:{ left:26, right:18, top:12, bottom:34, containLabel:false },
    xAxis:{ type:'category', data:terms, axisLabel:{ fontSize:11 } },
    yAxis:{ type:'value', min:0, max:7, interval:1, axisLabel:{ fontSize:11 } },
    series:[{
      type:'line',
      data: curRows.map(r=>num(r.mode_id)),
      symbol:'circle',
      symbolSize:9,
      showSymbol:true,
      lineStyle:{ width:2, color:'#3B82F6' },
      itemStyle:{ color:'#3B82F6' }
    }]
  }, { notMerge:true });

  charts.modeTl.off('click');
  charts.modeTl.on('click', p=>{
    // 点击学期点 -> 同步选择学期（页面其它模块随之更新）
    selectTermByIndex(p?.dataIndex);
  });
}

function renderProbTop3(){
  if(!charts.prob) charts.prob = echarts.init(document.getElementById('chart-prob-top3'));
  // 用“平均概率”选出Top3模式，再画随学期变化
  const avg = Array.from({length:8},(_,i)=>({i, v: mean(curRows.map(r=>num(r[`p_mode_${i}`])) ) || 0 }));
  avg.sort((a,b)=>b.v-a.v);
  const top = avg.slice(0,3).map(x=>x.i);
  const terms = curRows.map(r=>shortTerm(r.TERM_KEY));
  const series = top.map(i=>({
    name: `Mode ${i}`,
    type:'line',
    smooth:true,
    symbol:'circle',
    symbolSize:6,
    data: curRows.map(r=>{ const v=num(r[`p_mode_${i}`]); return v==null?null:+(v*100).toFixed(2); }),
    lineStyle:{ width:2.2, color: MODE_COLORS[i] },
    itemStyle:{ color: MODE_COLORS[i] }
  }));
  charts.prob.setOption({
    tooltip:{ trigger:'axis', confine:false, appendToBody:true, className:'mode-chart-tooltip',
      formatter: ps => ps.map(p=>`${p.axisValue}<br/>${p.marker}${esc(p.seriesName)}：${p.value}%`).join('<br/>') },
    legend:{ bottom:0, textStyle:{ fontSize:11 } },
    grid:{ left:46, right:16, top:18, bottom:50, containLabel:false },
    xAxis:{ type:'category', data:terms, axisLabel:{ fontSize:11 } },
    yAxis:{ type:'value', axisLabel:{ fontSize:11, formatter:v=>v+'%' }, min:0, max:100 },
    series
  }, { notMerge:true });

  charts.prob.off('click');
  charts.prob.on('click', p=>{
    // 点击某学期 -> 同步选择学期
    selectTermByIndex(p?.dataIndex);
  });
}

document.addEventListener('appReady', async ()=>{
  try{
    allStuRows = await loadStudentCSV();
    // 自动进入“上次登录”的学生（进入页面默认展示当前学生）
    const lastXH = localStorage.getItem('student_last_xh');
    if (lastXH) {
      document.getElementById('inp-xh').value = lastXH;
      searchStudent();
    } else {
      setLoggedIn(false);
      document.getElementById('inp-xh').focus();
    }
  }catch(e){
    console.error(e);
    document.getElementById('app-error')?.removeAttribute('hidden');
  }
});
</script>
